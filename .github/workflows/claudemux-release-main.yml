name: claudemux release main

on:
  push:
    branches: [main]

concurrency:
  group: claudemux-release-main

permissions:
  contents: write

# GA runs as the bot (commit + push to main). HUSKY=0 disables the local
# pre-push changeset hook for the same reason as release-next: the GA commit
# touches release-surface files whose changesets are already consumed.
env:
  HUSKY: "0"

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      # Whether this run actually committed and pushed a GA version. The publish
      # job below keys off this so a no-op run (main not in pre mode, or no
      # change to commit) never reaches npm.
      did_release: ${{ steps.ga.outputs.did_release }}
    steps:
      - name: Create claudemux release app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CLAUDEMUX_RELEASE_APP_ID }}
          private-key: ${{ secrets.CLAUDEMUX_RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0
          ref: main

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace tooling
        run: pnpm install --frozen-lockfile

      - name: Exit pre mode, version, and push GA
        id: ga
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # GA only fires when main is carrying prerelease state promoted from
          # next (.changeset/pre.json with mode=pre). `version-ga` runs
          # `changeset pre exit && changeset version`, which deletes pre.json, so
          # the bot's own GA commit re-triggers this workflow with no pre.json —
          # the guard below then exits 0. That is the loop break.
          if [ ! -f .changeset/pre.json ] || [ "$(jq -r '.mode // ""' .changeset/pre.json)" != "pre" ]; then
            echo 'main is not in prerelease mode; nothing to promote.'
            echo "did_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          pnpm --dir plugins/claudemux version-ga

          v=$(jq -r .version plugins/claudemux/package.json)
          case "$v" in
            *-beta*)
              echo "::error::GA produced a beta version $v"
              exit 1
              ;;
          esac

          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git config user.name 'github-actions[bot]'
          git add -A
          if git diff --staged --quiet; then
            echo 'Nothing to commit.'
            echo "did_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore(release): claudemux ${v} GA"
          git remote set-url origin "https://x-access-token:${APP_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:main
          echo "did_release=true" >> "$GITHUB_OUTPUT"

  # Publishes @excitedjs/tm to npm via OIDC trusted publishing — no long-lived
  # npm token. npm exchanges the GitHub Actions OIDC token for a short-lived
  # publish token; the package must list this workflow as a trusted publisher on
  # npmjs.com (repo=excitedjs/claudemux, workflow=claudemux-release-main.yml).
  #
  # Gated on the release job actually pushing a GA commit (did_release). As an
  # independent safety net the publish step re-checks npm and no-ops when the
  # version is already there, so a GA that bumped nothing never republishes.
  publish:
    needs: release
    if: needs.release.outputs.did_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read   # checkout only
      id-token: write  # OIDC token for npm trusted publishing
    steps:
      # Check out main after the release job's GA commit landed, so package.json
      # carries the published version.
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v6
        with:
          # OIDC tokenless trusted publishing requires Node >= 22.14.0;
          # node-version 22 resolves to the latest 22.x, always above it.
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Decide whether this version needs publishing
        id: guard
        working-directory: plugins/claudemux
        run: |
          name=$(jq -r .name package.json)
          version=$(jq -r .version package.json)
          # Idempotency net: publish only a version npm does not already carry,
          # so a no-op GA (pre exit with no changesets, version unchanged) does
          # not attempt to republish an existing version and fail the job.
          if npm view "${name}@${version}" version >/dev/null 2>&1; then
            echo "already published ${name}@${version}; nothing to do."
            echo "go=false" >> "$GITHUB_OUTPUT"
          else
            echo "will publish ${name}@${version}."
            echo "go=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upgrade npm for OIDC trusted publishing
        if: steps.guard.outputs.go == 'true'
        # >= 11.5.1 is the npm version that GA'd OIDC tokenless trusted
        # publishing (2025-07-31); Node 22 LTS ships npm 10.x, below it.
        run: npm install -g npm@11.5.1

      - name: Publish @excitedjs/tm to npm (OIDC trusted publishing)
        if: steps.guard.outputs.go == 'true'
        working-directory: plugins/claudemux
        # No NODE_AUTH_TOKEN — npm 11.5.1+ detects the Actions OIDC environment
        # and exchanges the token with the registry automatically.
        run: npm publish --provenance --access public
